    <script>
        fetch('obtener_datos.php')
            .then(res => res.json())
            .then(data => {
                const render = (lista, id) => {
                    const tbody = document.querySelector(`#${id} tbody`);
                    lista.forEach(item => {
                        let row = `<tr>`;
                        Object.values(item).slice(1).forEach(val => {
                            row += `<td>${val || '<i>N/A</i>'}</td>`;
                        });
                        row += `</tr>`;
                        tbody.innerHTML += row;
                    });
                };
                render(data.smartphones, 'tabla-celulares');
                render(data.hogar, 'tabla-hogar');
            });
    </script>
